<!DOCTYPE html>
<html>
<head>
    <title>Simple Interest Calculator</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            margin-top: 100px;
        }
        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            margin: auto;
        }
        input {
            margin: 10px;
            padding: 8px;
            width: 90%;
        }
        button {
            padding: 10px;
            background: #4facfe;
            color: white;
            border: none;
            cursor: pointer;
        }
        h2 {
            color: #333;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Simple Interest Calculator</h2>

    <input type="number" id="principal" placeholder="Principal"><br>
    <input type="number" id="rate" placeholder="Rate (%)"><br>
    <input type="number" id="time" placeholder="Time (years)"><br>

    <button onclick="calculate()">Calculate</button>

    <h3 id="result"></h3>
</div>

<script>
function calculate() {
    let p = document.getElementById("principal").value;
    let r = document.getElementById("rate").value;
    let t = document.getElementById("time").value;

    let si = (p * r * t) / 100;

    document.getElementById("result").innerText = "Simple Interest: " + si;
}
</script>

</body>
</html>
